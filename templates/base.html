<!DOCTYPE html>
<html lang="{{ site.language | default('es') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ site.description }}{% endblock %}">
  <meta name="author" content="{{ site.author }}">
  {% block meta %}{% endblock %}

  <!-- Open Graph -->
  <meta property="og:type" content="{% block og_type %}website{% endblock %}">
  <meta property="og:title" content="{% block og_title %}{{ site.title }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ site.description }}{% endblock %}">
  <meta property="og:url" content="{% block og_url %}{{ site.url }}{% endblock %}">
  {% block og_image %}{% endblock %}

  <!-- Google Fonts: Fraunces (headings) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..500&family=DM+Sans:ital,opsz,wght@0,9..40,300..600;1,9..40,300..500&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- Prism.js syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">

  <!-- Custom styles -->
  <link rel="stylesheet" href="{{ base_url }}assets/css/main.css">

  {% block head_extra %}{% endblock %}
</head>
<body>

  {% include "partials/navbar.html" %}

  <!-- Page content -->
  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Prism.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

  <!-- Custom JS -->
  <script src="{{ base_url }}assets/js/main.js"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
