<!-- Footer -->
<footer class="site-footer">
  <div class="container">
    <div class="row align-items-center gy-3">
      <div class="col-md-6">
        <p class="footer-brand mb-1">
          <i class="fa-solid fa-pen-nib me-2"></i>{{ site.title }}
        </p>
        <p class="footer-desc mb-0">{{ site.description }}</p>
      </div>
      <div class="col-md-6 text-md-end">
        <div class="footer-links mb-2">
          {% if social.github %}
          <a href="{{ social.github }}" title="GitHub" target="_blank" rel="noopener">
            <i class="fa-brands fa-github"></i>
          </a>
          {% endif %}
          {% if social.youtube %}
          <a href="{{ social.youtube }}" title="YouTube" target="_blank" rel="noopener">
            <i class="fa-brands fa-youtube"></i>
          </a>
          {% endif %}
          {% if social.x %}
          <a href="{{ social.x }}" title="X" target="_blank" rel="noopener">
            <i class="fa-brands fa-x-twitter"></i>
          </a>
          {% endif %}
        </div>
        <p class="footer-copy mb-0">
          &copy; {{ site.title }} &mdash;
          <span>Generado con Python &amp; Markdown</span>
        </p>
      </div>
    </div>
  </div>
</footer>
